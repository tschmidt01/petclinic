spring.application.name=petclinic-mcp

# Run on a separate port from the backend (8080) and frontend (4200).
server.port=8090

# Same Postgres DB the backend uses.
spring.datasource.url=jdbc:postgresql://localhost:5432/petclinic
spring.datasource.username=petclinic
spring.datasource.password=petclinic

# Backend owns schema + migrations; MCP just reads/writes data.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

# MCP server config
spring.ai.mcp.server.name=petclinic-mcp
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC

# HTTP Basic auth credentials — username must match an Owner lastName so me://profile resolves.
petclinic.mcp.user=Weasley
petclinic.mcp.password=s3cret
